id: startrek
grading:   # Grading specifies point thresholds for individual marks (1-4) as follows:
  1: -3    # -3 and more points (16 should be maximum here) => grade 1
  2: -6    # -6 to -3 points => grade 2
  3: -9    # -9 to -6 points => grade 3
  4: null  # -10 points or less => grade 4, null = no lower limit (recommended), 0 can be used in positive grading as well
